name: ci

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  validate-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check package tarball
        run: npm pack --dry-run

      - name: Smoke test generator
        shell: bash
        run: |
          TMP_DIR="$(mktemp -d)"
          node --input-type=module -e "import { writeTemplateSet } from '${GITHUB_WORKSPACE}/src/writer.js'; await writeTemplateSet({ targetDir: '${TMP_DIR}', projectName: 'ci-smoke', packageManager: 'npm', includeCI: true });"

          cd "$TMP_DIR"

          test -f AGENTS.md
          test -f CLAUDE.md
          test -f docs/adr/README.md
          test -f docs/adr/0000-template.md
          test -f .github/copilot-instructions.md
          test -f .github/pull_request_template.md
          test -f .github/workflows/policy-check.yml
