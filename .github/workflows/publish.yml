name: publish

on:
  workflow_dispatch:
  push:
    tags:
      - '*.*.*'
      - 'v*.*.*'

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "Tag ${{ github.ref_name }} is not reachable from main. Aborting."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set package version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Tag version '$TAG_VERSION' is not a valid semver-like version."
            exit 1
          fi
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_VERSION" = "$TAG_VERSION" ]; then
            echo "package.json already at $TAG_VERSION, nothing to change."
          else
            npm version "$TAG_VERSION" --no-git-tag-version
            echo "Updated package.json from $CURRENT_VERSION to $TAG_VERSION (from tag $GITHUB_REF_NAME)."
          fi

      - name: Sync package.json version on main
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          git fetch origin main
          git checkout -B main origin/main

          CURRENT_MAIN_VERSION=$(node -p "require('./package.json').version")
          if [ "$CURRENT_MAIN_VERSION" = "$TAG_VERSION" ]; then
            echo "package.json on main is already aligned to $TAG_VERSION"
            exit 0
          fi

          npm version "$TAG_VERSION" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): align package version to $TAG_VERSION"
          git push origin HEAD:main
          echo "package.json on main aligned to $TAG_VERSION"

      - name: Verify npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is missing. Add it in GitHub repo settings: Secrets and variables > Actions."
            exit 1
          fi
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Check if version already exists on npm
        id: version_check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$PKG_NAME@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION for $PKG_NAME already exists on npm. Skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Version $PKG_VERSION for $PKG_NAME is not published yet. Proceeding."
          fi

      - name: Publish package
        if: steps.version_check.outputs.exists != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish summary
        if: always()
        run: |
          if [ "${{ steps.version_check.outputs.exists }}" = "true" ]; then
            echo "No publish performed: ${{ steps.version_check.outputs.package_name }}@${{ steps.version_check.outputs.package_version }} already exists."
          else
            echo "Publish completed for ${{ steps.version_check.outputs.package_name }}@${{ steps.version_check.outputs.package_version }}."
          fi
